<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Proyectos - Coraline Acuarios</title>
    <link rel="icon" type="image/png" href="images/favicon.PNG">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/gallery.css?v=4.0">
</head>
<body>
    <!-- Barra de Navegación -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <a href="index.html">
                    <img src="images/logocoraline.PNG?v=2" alt="Coraline Acuarios" class="logo-img">
                </a>
            </div>
            <div class="language-selector">
                <button class="lang-btn active" data-lang="es" title="Español">
                    <span class="flag">🇪🇸</span>
                </button>
                <button class="lang-btn" data-lang="en" title="English">
                    <span class="flag">🇬🇧</span>
                </button>
            </div>

            <ul class="nav-menu">
                <li><a href="index.html#inicio" class="nav-link" data-i18n="nav.home">Inicio</a></li>
                <li><a href="index.html#nosotros" class="nav-link" data-i18n="nav.about">Nosotros</a></li>
                <li><a href="index.html#catalogo" class="nav-link" data-i18n="nav.catalog">Catálogo</a></li>
                <li><a href="galeria.html" class="nav-link active" data-i18n="nav.gallery">Galería</a></li>
                <li><a href="blog.html" class="nav-link" data-i18n="nav.blog">Blog</a></li>
                <li><a href="cotizador.html" class="nav-link btn-cotizar" data-i18n="nav.quote">Cotizador</a></li>
                <li><a href="contacto.html" class="nav-link" data-i18n="nav.contact">Contacto</a></li>
            </ul>

            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Hero de Galería -->
    <section class="gallery-hero">
        <div class="container">
            <h1 class="gallery-title" data-i18n="gallery.title">Nuestros Proyectos</h1>
        </div>
    </section>

    <!-- Grid de Galería -->
    <section class="gallery-section">
        <div class="container">
            <div class="gallery-grid" id="galleryGrid">
                <!-- Las imágenes se cargarán aquí dinámicamente -->
            </div>
        </div>
    </section>

    <!-- Botón volver -->
    <section class="back-section">
        <div class="container">
            <a href="index.html#nosotros" class="btn-back" data-i18n="gallery.backButton">Volver a Inicio</a>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Coraline Acuarios. <span data-i18n="footer.rights">Todos los derechos reservados.</span></p>
        </div>
    </footer>

    <script src="js/logger.js"></script>
    <script src="js/translations.js"></script>
    <script src="js/script.js"></script>
    <script src="js/gallery.js?v=4.0"></script>
</body>
</html>
